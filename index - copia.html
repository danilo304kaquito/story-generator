<!DOCTYPE html>
<html>
<head>
<title>Generador de Historias</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:600px;
margin:auto;
border-radius:10px;
}

input,select{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:12px 20px;
background:#6c63ff;
color:white;
border:none;
border-radius:5px;
font-size:18px;
}

#story{
margin-top:20px;
padding:20px;
background:#eee;
}

</style>
</head>

<body>

<div class="container">

<h1>Generador de Historias</h1>

<input id="tema" placeholder="Tema">

<select id="genero">
<option>Terror</option>
<option>Fantasia</option>
<option>Romance</option>
<option>Ciencia Ficcion</option>
</select>

<input id="personajes" placeholder="Numero de personajes">

<button onclick="generar()">Generar Historia</button>

<div id="story"></div>

</div>

<script>

function generar(){

let tema=document.getElementById("tema").value
let genero=document.getElementById("genero").value
let personajes=document.getElementById("personajes").value

let historia=""

historia="En una historia de "+genero+
", "+personajes+
" personajes se encuentran en una situacion relacionada con "+tema+
". Lo que comienza como algo normal pronto se convierte en una aventura inesperada."

document.getElementById("story").innerText=historia

}

</script>

</body>
</html>
